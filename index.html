<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり診断</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="title">サボり診断メーカー</div>

  <div class="center">
    <div class="loading hidden" id="loading">診断中...</div>
    <div class="loadingText hidden" id="loadingText"></div>

    <div class="level" id="level">Lv --</div>
    <div class="nickname" id="nickname">---</div>
    <div class="text" id="text">ボタンを押してね</div>
  </div>

  <div class="buttons">
    <button class="primary" onclick="run()">診断する</button>
    <button class="secondary" onclick="copyResult()">コピー</button>
    <button class="secondary" onclick="shareResult()">シェア</button>
  </div>

</div>

<script src="./data.js"></script>
<script src="./engine.js"></script>

</body>
</html>
