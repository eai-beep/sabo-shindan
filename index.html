<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり診断 MAX</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 24px;
  text-align: center;
}

.title {
  font-size: 20px;
  margin-bottom: 20px;
}

.level { font-size: 28px; margin: 10px 0; }
.nickname { font-size: 22px; margin: 10px 0; }
.text { margin: 10px 0; opacity: 0.8; }

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: gold;
  font-weight: bold;
  color: black;
}

.secondary {
  background: #333;
  color: white;
}

#loading {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 100;
}

#ssrOverlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  background: rgba(0,0,0,0.85);
  color: gold;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 200;
}

#ssrOverlay.active,
#loading.active {
  display: flex;
}

#ssrOverlay.show { opacity: 1; }

/* effects */
.shake { animation: shake 0.4s ease; }
.flash { animation: flash 0.6s ease; }

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-5px,3px); }
  50% { transform: translate(5px,-3px); }
  100% { transform: translate(0,0); }
}

@keyframes flash {
  0% { background:#000; }
  40% { background:#fff; }
  100% { background:#111; }
}
</style>

</head>

<body>

<div id="loading">
  <div id="loadingText"></div>
</div>

<div id="ssrOverlay">？？？</div>

<div class="container">

  <div class="title">サボり診断 MAX</div>

  <div class="level" id="level">Lv --</div>
  <div class="nickname" id="nickname">---</div>
  <div class="text" id="text">ボタンを押してね</div>

  <button class="primary" onclick="run()">診断する</button>
  <button class="secondary" onclick="shareResult()">結果をシェアURLでコピー</button>
  <button class="secondary" onclick="resetUIWithURLClear()">リセット</button>

</div>

<script>
// 将来の300件拡張を見据え、一意のID（文字列等でも可）を定義
const data = [
  { id: 1, level: 1, rank: "N", name: "起動前人間", text: "まだ何もしてないのに疲れてる" },
  { id: 5, level: 5, rank: "N", name: "軽休憩民", text: "休憩がメインになってる" },
  { id: 10, level: 10, rank: "R", name: "スマホ吸引体", text: "気づいたらスマホを開いている" },
  { id: 20, level: 20, rank: "R", name: "動画中毒者", text: "1本のつもりが止まらない" },
  { id: 50, level: 50, rank: "SR", name: "現実逃避マスター", text: "気づいたら別のことしてる" },
  { id: 99, level: 99, rank: "SSR", name: "サボり神", text: "努力という概念が未実装" }
];

const loadingMessages = [
  "解析中...",
  "診断中...",
  "未来計算中...",
  "サボり度測定中..."
];

let state = "idle";
let loadingInterval;
let lastResult = null;

// ■ 拡張機能: ページ読み込み時にURLパラメータをチェックして復元
window.addEventListener("DOMContentLoaded", () => {
  const urlParams = new URLSearchParams(window.location.search);
  const sharedId = urlParams.get("id");

  if (sharedId) {
    // パラメータのIDに一致するデータを検索
    const sharedData = data.find(item => item.id == sharedId);
    if (sharedData) {
      lastResult = sharedData;
      showResult(sharedData); // 共有時は演出なしで即表示（UX快適化）
    }
  }
});

function run() {
  if (state !== "idle") return;

  state = "loading";
  resetUI();

  startLoading(() => {
    const result = data[Math.floor(Math.random() * data.length)];
    lastResult = result;

    // ブラウザのURLバーを、診断されたIDのURLにこっそり書き換える（ページはリロードされない）
    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?id=${result.id}`;
    window.history.pushState({ path: newUrl }, '', newUrl);

    playFx(result, () => {
      showResult(result);
      state = "idle";
    });
  });
}

function startLoading(done) {
  const loading = document.getElementById("loading");
  const text = document.getElementById("loadingText");

  loading.classList.add("active");

  let i = 0;
  text.textContent = loadingMessages[0];

  loadingInterval = setInterval(() => {
    i++;
    text.textContent = loadingMessages[i % loadingMessages.length];
  }, 120);

  setTimeout(() => {
    clearInterval(loadingInterval);
    loading.classList.remove("active");
    done();
  }, 1200);
}

function showResult(r) {
  document.getElementById("level").textContent = "Lv " + r.level;
  document.getElementById("nickname").textContent = r.name;
  document.getElementById("text").textContent = r.text;
}

function resetUI() {
  document.getElementById("level").textContent = "Lv --";
  document.getElementById("nickname").textContent = "---";
  document.getElementById("text").textContent = "ボタンを押してね";
}

// リセット時はURLのパラメータも綺麗に消す設計
function resetUIWithURLClear() {
  resetUI();
  lastResult = null;
  const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
  window.history.pushState({ path: cleanUrl }, '', cleanUrl);
}

function playFx(result, callback) {
  playShake();
  playFlash();

  if (result.rank === "SSR") {
    playSSR(callback);
  } else {
    callback();
  }
}

function playShake() {
  document.body.classList.add("shake");
  setTimeout(() => document.body.classList.remove("shake"), 400);
}

function playFlash() {
  document.body.classList.add("flash");
  setTimeout(() => document.body.classList.remove("flash"), 600);
}

function playSSR(callback) {
  const overlay = document.getElementById("ssrOverlay");

  overlay.classList.add("active");
  setTimeout(() => overlay.classList.add("show"), 10);

  setTimeout(() => {
    overlay.textContent = "✨ SSR確定 ✨";
  }, 500);

  setTimeout(() => {
    overlay.classList.remove("show");

    setTimeout(() => {
      overlay.classList.remove("active");
      overlay.textContent = "？？？";
      callback();
    }, 200);
  }, 1200);
}

/* ■ シェア機能（URL復元対応版） */
function shareResult() {
  if (!lastResult) {
    alert("まだ診断してないよ！");
    return;
  }

  // 現在のURL（?id=xx 付き）を取得
  const shareUrl = window.location.href;

  const text =
`【サボり診断 MAX】
結果：${lastResult.name} (Lv ${lastResult.level})
「${lastResult.text}」

👇あなたのサボり度を測定する
${shareUrl}`;

  navigator.clipboard.writeText(text)
    .then(() => {
      alert("結果と共有URLをコピーしました！SNSに貼り付けてね！");
    })
    .catch(() => {
      alert("コピーに失敗しました。URLはこちらです：\n" + shareUrl);
    });
}
</script>

</body>
</html>
