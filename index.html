<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり診断</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 24px;
  text-align: center;
}

.title {
  font-size: 20px;
  margin-bottom: 20px;
}

.level {
  font-size: 28px;
  margin: 10px 0;
}

.nickname {
  font-size: 22px;
  margin: 10px 0;
}

.text {
  margin: 10px 0;
  opacity: 0.8;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: gold;
  font-weight: bold;
  color: black;
}

.secondary {
  background: #333;
  color: white;
}

/* 修正①: IDセレクタに負けないよう !important を付与 */
.hidden { display: none !important; }

/* loading */
#loading {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 100;
}

/* SSR */
#ssrOverlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  background: rgba(0,0,0,0.85);
  color: gold;
  opacity: 0;
  transition: 0.2s;
  z-index: 200;
}

#ssrOverlay.show {
  opacity: 1;
}
</style>

</head>

<body>

<div id="loading" class="hidden">
  <div id="loadingText"></div>
</div>

<div id="ssrOverlay" class="hidden">？？？</div>

<div class="container">

  <div class="title">サボり診断</div>

  <div class="level" id="level">Lv --</div>
  <div class="nickname" id="nickname">---</div>
  <div class="text" id="text">ボタンを押してね</div>

  <button class="primary" onclick="run()">診断する</button>
  <button class="secondary" onclick="resetUI()">リセット</button>

</div>

<script>
const data = [
  { level: 1, rank: "N", name: "起動前人間", text: "まだ何もしてないのに疲れてる" },
  { level: 5, rank: "N", name: "軽休憩民", text: "休憩がメインになってる" },
  { level: 10, rank: "R", name: "スマホ吸引体", text: "気づいたらスマホを開いている" },
  { level: 20, rank: "R", name: "動画中毒者", text: "1本のつもりが止まらない" },
  { level: 50, rank: "SR", name: "現実逃避マスター", text: "気づいたら別のことしてる" },
  { level: 99, rank: "SSR", name: "サボり神", text: "努力という概念が未実装" }
];

const loadingMessages = [
  "解析中...",
  "診断中...",
  "計算中...",
  "チェック中..."
];

let state = "idle";
let loadingInterval;

function run() {
  if (state !== "idle") return;

  state = "loading";
  resetUI();

  startLoading(() => {
    // ランダム選出
    const result = data[Math.floor(Math.random() * data.length)];

    // 修正②: SSRの時だけカットイン演出を挟む条件分岐
    if (result.rank === "SSR") {
      playSSR(result, () => {
        showResult(result);
        state = "idle";
      });
    } else {
      // N, R, SR の場合は演出なしで即結果表示
      showResult(result);
      state = "idle";
    }
  });
}

function startLoading(done) {
  const loading = document.getElementById("loading");
  const text = document.getElementById("loadingText");

  loading.classList.remove("hidden");
  
  let i = 0;
  text.textContent = loadingMessages[0];

  loadingInterval = setInterval(() => {
    i++;
    text.textContent = loadingMessages[i % loadingMessages.length];
  }, 150);

  setTimeout(() => {
    clearInterval(loadingInterval);
    loading.classList.add("hidden");
    done();
  }, 1200); // 演出体感のために1.2秒固定
}

function showResult(r) {
  document.getElementById("level").textContent = "Lv " + r.level;
  document.getElementById("nickname").textContent = r.name;
  document.getElementById("text").textContent = r.text;
}

function resetUI() {
  document.getElementById("level").textContent = "Lv --";
  document.getElementById("nickname").textContent = "---";
  document.getElementById("text").textContent = "ボタンを押してね";
}

function playSSR(result, callback) {
  const overlay = document.getElementById("ssrOverlay");

  overlay.classList.remove("hidden");
  
  // classListの追加を確実に反映させるための微小タイマー
  setTimeout(() => {
    overlay.classList.add("show");
  }, 10);

  setTimeout(() => {
    overlay.textContent = "✨ SSR確定 ✨";
  }, 400);

  setTimeout(() => {
    overlay.classList.remove("show");
    setTimeout(() => {
      overlay.classList.add("hidden");
      overlay.textContent = "？？？";
      callback();
    }, 200); // フェードアウトの0.2秒を待ってから完全に隠す
  }, 1400);
}
</script>

</body>
</html>
