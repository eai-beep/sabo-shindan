<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり診断</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 420px;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
}

.title {
  text-align: center;
  opacity: 0.6;
}

.center {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

.level {
  font-size: 64px;
  color: #ff4d4d;
  font-weight: bold;
}

.nickname {
  font-size: 30px;
  margin-top: 10px;
}

.text {
  margin-top: 20px;
  font-size: 16px;
}

.buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: auto;
}

button {
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
}

.primary { background: #ff4d4d; color: white; }
.secondary { background: #2a2a2a; color: white; }

#loading {
  display: none;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">サボり診断メーカー</div>

  <div id="loading">診断中...</div>

  <div class="center" id="main">
    <div class="level" id="level">Lv --</div>
    <div class="nickname" id="nickname">---</div>
    <div class="text" id="text">ボタンを押してね</div>
  </div>

  <div class="buttons">
    <button class="primary" onclick="run()">診断する</button>
    <button class="secondary" onclick="copyResult()">コピー</button>
    <button class="secondary" onclick="shareResult()">シェア</button>
  </div>

</div>

<script src="data.js"></script>
<script src="engine.js"></script>

</body>
</html>
