<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり診断 MAX</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 24px;
  text-align: center;
}

.title {
  font-size: 20px;
  margin-bottom: 20px;
}

.level { font-size: 28px; margin: 10px 0; }
.nickname { font-size: 22px; margin: 10px 0; }
.text { margin: 10px 0; opacity: 0.8; }

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: gold;
  font-weight: bold;
  color: black;
}

.secondary {
  background: #333;
  color: white;
}

.hidden { display:none; }

/* loading */
#loading {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 18px;
  z-index: 100;
}

/* SSR */
#ssrOverlay {
  position: fixed;
  inset: 0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 48px;
  background: rgba(0,0,0,0.85);
  color: gold;
  opacity: 0;
  transition: 0.2s;
  z-index: 200;
}

#ssrOverlay.show { opacity: 1; }

/* effects */
.shake { animation: shake 0.4s ease; }
.flash { animation: flash 0.6s ease; }

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-5px,3px); }
  50% { transform: translate(5px,-3px); }
  100% { transform: translate(0,0); }
}

@keyframes flash {
  0% { background:#000; }
  40% { background:#fff; }
  100% { background:#111; }
}
</style>

</head>

<body>

<div id="loading" class="hidden">
  <div id="loadingText"></div>
</div>

<div id="ssrOverlay" class="hidden">？？？</div>

<div class="container">

  <div class="title">サボり診断 MAX</div>

  <div class="level" id="level">Lv --</div>
  <div class="nickname" id="nickname">---</div>
  <div class="text" id="text">ボタンを押してね</div>

  <button class="primary" onclick="run()">診断する</button>
  <button class="secondary" onclick="shareResult()">シェア</button>
  <button class="secondary" onclick="resetUI()">リセット</button>

</div>

<script>
const data = [
  { level: 1, rank: "N", name: "起動前人間", text: "まだ何もしてないのに疲れてる" },
  { level: 5, rank: "N", name: "軽休憩民", text: "休憩がメインになってる" },
  { level: 10, rank: "R", name: "スマホ吸引体", text: "気づいたらスマホを開いている" },
  { level: 20, rank: "R", name: "動画中毒者", text: "1本のつもりが止まらない" },
  { level: 50, rank: "SR", name: "現実逃避マスター", text: "気づいたら別のことしてる" },
  { level: 99, rank: "SSR", name: "サボり神", text: "努力という概念が未実装" }
];

const loadingMessages = [
  "解析中...",
  "診断中...",
  "未来計算中...",
  "サボり度測定中..."
];

let state = "idle";
let loadingInterval;
let lastResult = null;

function run() {
  if (state !== "idle") return;

  state = "loading";
  resetUI();

  startLoading(() => {
    const result = data[Math.floor(Math.random() * data.length)];
    lastResult = result;

    playFx(result, () => {
      showResult(result);
      state = "idle";
    });
  });
}

function startLoading(done) {
  const loading = document.getElementById("loading");
  const text = document.getElementById("loadingText");

  loading.classList.remove("hidden");

  let i = 0;

  loadingInterval = setInterval(() => {
    text.textContent = loadingMessages[i % loadingMessages.length];
    i++;
  }, 120);

  setTimeout(() => {
    clearInterval(loadingInterval);
    loading.classList.add("hidden");
    done();
  }, 1200);
}

function showResult(r) {
  document.getElementById("level").textContent = "Lv " + r.level;
  document.getElementById("nickname").textContent = r.name;
  document.getElementById("text").textContent = r.text;
}

function resetUI() {
  document.getElementById("level").textContent = "Lv --";
  document.getElementById("nickname").textContent = "---";
  document.getElementById("text").textContent = "ボタンを押してね";
}

function playFx(result, callback) {
  playShake();
  playFlash();

  if (result.rank === "SSR") {
    playSSR(callback);
  } else {
    callback();
  }
}

function playShake() {
  document.body.classList.add("shake");
  setTimeout(() => document.body.classList.remove("shake"), 400);
}

function playFlash() {
  document.body.classList.add("flash");
  setTimeout(() => document.body.classList.remove("flash"), 600);
}

function playSSR(callback) {
  const overlay = document.getElementById("ssrOverlay");

  overlay.classList.remove("hidden");
  setTimeout(() => overlay.classList.add("show"), 10);

  setTimeout(() => {
    overlay.textContent = "✨ SSR確定 ✨";
  }, 500);

  setTimeout(() => {
    overlay.classList.remove("show");

    setTimeout(() => {
      overlay.classList.add("hidden");
      overlay.textContent = "？？？";
      callback();
    }, 200);
  }, 1200);
}

/* ■ シェア機能 */
function shareResult() {
  if (!lastResult) {
    alert("まだ診断してない");
    return;
  }

  const text =
`【サボり診断】
Lv ${lastResult.level}
${lastResult.name}
${lastResult.text}`;

  navigator.clipboard.writeText(text);
  alert("結果をコピーした");
}
</script>

</body>
</html>
