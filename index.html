<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり診断</title>

<style>
body {
  margin: 0;
  font-family: "Arial Black", "Noto Sans JP", sans-serif;
  background: #0f0f0f;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
}

.container {
  width: 390px;
  min-height: 100vh;
  background: #111;
  padding: 24px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;

  border-radius: 20px;
}

.title {
  font-size: 16px;
  opacity: 0.7;
}

.center {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

.level {
  font-size: 64px;
  font-weight: 900;
  color: #ff4d4d;
}

.nickname {
  font-size: 48px;
  font-weight: 900;
  margin-top: 20px;
}

.text {
  font-size: 20px;
  line-height: 1.6;
  margin-top: 30px;
  color: #eaeaea;
  padding: 0 10px;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: #ff4d4d;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">サボり診断メーカー</div>

  <div class="center">
    <div class="level" id="level">Lv. --</div>
    <div class="nickname" id="nickname">---</div>
    <div class="text" id="text">診断ボタンを押してね</div>
  </div>

  <button onclick="run()">もう一回診断</button>
  <button onclick="shot()">スクショする</button>

</div>

<script>

// ■ ミーム辞書
const data = [
  { level: 87, name: "偏差値溶かし職人", text: "スマホ6時間、勉強0時間。その集中力はTikTok専用。" },
  { level: 42, name: "無限スクロール亡者", text: "二次不等式を後回しにして3時間スクロール。" },
  { level: 99, name: "現実逃避マスター", text: "テスト3日前なのに掃除が進行中。" },
  { level: 73, name: "夜更かし依存体", text: "午前2時の『明日やる』はもう習慣。" }
];

// ■ 表示関数
function run(){
  const r = data[Math.floor(Math.random() * data.length)];

  document.getElementById("level").innerText = "Lv. " + r.level;
  document.getElementById("nickname").innerText = r.name;
  document.getElementById("text").innerText = r.text;
}

// ■ スクショ誘導
function shot(){
  alert("この画面をスクショしてSNSに投稿してね");
}

</script>

</body>
</html>
