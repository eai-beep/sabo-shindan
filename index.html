<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり診断</title>

<style>
body {
  margin: 0;
  font-family: "Arial Black", "Noto Sans JP", sans-serif;
  background: #0f0f0f;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  width: 390px;
  height: 100dvh;
  background: #111;
  padding: 24px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  justify-content: space-between;

  border-radius: 20px;
  overflow: hidden;
}

.title {
  font-size: 16px;
  opacity: 0.7;
  text-align: center;
}

.center {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

.level {
  font-size: 72px;
  font-weight: 900;
  color: #ff4d4d;
}

.nickname {
  font-size: 44px;
  font-weight: 900;
  margin-top: 16px;
}

.text {
  font-size: 20px;
  line-height: 1.6;
  margin-top: 28px;
  color: #eaeaea;
  padding: 0 10px;
}

.buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
}

.primary {
  background: #ff4d4d;
  color: white;
}

.secondary {
  background: #2a2a2a;
  color: white;
}

/* トースト */
#toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  padding: 12px 18px;
  border-radius: 12px;
  font-size: 14px;
  opacity: 0;
  transition: 0.25s;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">サボり診断メーカー</div>

  <div class="center">
    <div class="level" id="level">Lv. --</div>
    <div class="nickname" id="nickname">ボタンを押してね</div>
    <div class="text" id="text">診断結果がここに出る</div>
  </div>

  <div class="buttons">
    <button class="primary" id="mainBtn" onclick="run()">診断する</button>
    <button class="secondary" onclick="copyResult()">結果をコピー</button>
    <button class="secondary" onclick="shareResult()">シェア</button>
  </div>

</div>

<div id="toast">コピーしました</div>

<script>

// ■ データ
const data = [
  { level: 87, name: "偏差値溶かし職人", text: "スマホ6時間、勉強0時間。その集中力はTikTok専用。" },
  { level: 42, name: "無限スクロール亡者", text: "やることあるのに気づいたら3時間スクロール。" },
  { level: 99, name: "現実逃避マスター", text: "テスト3日前なのに部屋が一番きれい。" },
  { level: 73, name: "夜更かし依存体", text: "午前2時の『明日やる』はもう習慣。" }
];

let current = null;

// ■ 診断
function run(){

  const r = data[Math.floor(Math.random() * data.length)];
  current = r;

  document.getElementById("level").innerText = "Lv. " + r.level;
  document.getElementById("nickname").innerText = r.name;
  document.getElementById("text").innerText = r.text;

  // ボタン状態変更
  document.getElementById("mainBtn").innerText = "もう一回診断";
}

// ■ コピー
function copyResult(){

  if(!current) return;

  const text =
`${current.level}
${current.name}
${current.text}`;

  navigator.clipboard.writeText(text);

  showToast("コピーしました");
}

// ■ シェア
function shareResult(){

  if(!current) return;

  const text =
`【サボり診断】
Lv.${current.level}
${current.name}
${current.text}

#サボり診断`;

  if(navigator.share){
    navigator.share({
      title: "サボり診断",
      text: text
    }).then(() => {
      showToast("シェアしました🔥");
    });
  } else {
    navigator.clipboard.writeText(text);
    showToast("コピーしました（代替）");
  }
}

// ■ トースト表示
function showToast(msg){

  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.opacity = 1;

  setTimeout(() => {
    t.style.opacity = 0;
  }, 1200);
}

</script>

</body>
</html>
