<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり診断 MAX</title>

<!-- html2canvas（無料） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 24px;
  text-align: center;
}

.title {
  font-size: 20px;
  margin-bottom: 20px;
}

.level { font-size: 28px; margin: 10px 0; }
.nickname { font-size: 22px; margin: 10px 0; }
.text { margin: 10px 0; opacity: 0.8; }

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: gold;
  font-weight: bold;
  color: black;
}

.secondary {
  background: #333;
  color: white;
}
</style>
</head>

<body>

<div class="container" id="card">

  <div class="title">サボり診断 MAX</div>

  <div class="level" id="level">Lv --</div>
  <div class="nickname" id="nickname">---</div>
  <div class="text" id="text">ボタンを押してね</div>

  <button class="primary" onclick="run()">診断する</button>
  <button class="secondary" onclick="shareImage()">画像でシェア</button>

</div>

<script>
const data = [
  { level: 1, rank: "N", name: "起動前人間", text: "まだ何もしてないのに疲れてる" },
  { level: 5, rank: "N", name: "軽休憩民", text: "休憩がメインになってる" },
  { level: 10, rank: "R", name: "スマホ吸引体", text: "気づいたらスマホを開いている" },
  { level: 20, rank: "R", name: "動画中毒者", text: "1本のつもりが止まらない" },
  { level: 50, rank: "SR", name: "現実逃避マスター", text: "気づいたら別のことしてる" },
  { level: 99, rank: "SSR", name: "サボり神", text: "努力という概念が未実装" }
];

let lastResult = null;

/* =====================
   診断
===================== */
function run() {
  const r = data[Math.floor(Math.random() * data.length)];
  lastResult = r;

  document.getElementById("level").textContent = "Lv " + r.level;
  document.getElementById("nickname").textContent = r.name;
  document.getElementById("text").textContent = r.text;
}

/* =====================
   画像シェア（ここが本体）
===================== */
function shareImage() {
  const target = document.getElementById("card");

  html2canvas(target, {
    backgroundColor: "#111",
    scale: 2
  }).then(canvas => {

    const url = canvas.toDataURL("image/png");

    const a = document.createElement("a");
    a.href = url;
    a.download = "sabori_diagnosis.png";
    a.click();

  });
}
</script>

</body>
</html>
