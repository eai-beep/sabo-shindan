<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり度診断 MAX</title>

<!-- 画面を画像化するライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0b0b12;
  background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
  background-size: 16px 16px;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 12px; /* 縦幅削減のため少し狭く */
  box-sizing: border-box;
}

.container {
  width: 100%;
  max-width: 380px; /* 横幅を少しシャープにして縦伸びを防ぐ */
}

/* アプリタイトル */
.app-main-title {
  text-align: center;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 2px;
  color: #5a5a7a;
  margin-bottom: 10px;
}

/* 🎴 カード：全体的にパディングを削ってコンパクト化 */
.card-wrapper {
  background: #131322;
  border: 2px solid #23233b;
  border-radius: 16px;
  padding: 16px 20px; /* 上下左右をスリムに */
  box-sizing: border-box;
  box-shadow: 0 15px 35px rgba(0,0,0,0.6);
  position: relative;
  overflow: hidden;
  margin-bottom: 12px; /* 下の余白を縮小 */
}

/* ランク別カラー */
.card-wrapper.rank-N { border-color: #4a4a6a; }
.card-wrapper.rank-R { border-color: #00d2ff; box-shadow: 0 0 15px rgba(0,210,255,0.2); }
.card-wrapper.rank-SR { border-color: #ff007b; box-shadow: 0 0 20px rgba(255,0,123,0.25); }
.card-wrapper.rank-SSR { 
  border-color: #ffb700; 
  background: linear-gradient(135deg, #131322 0%, #2b200a 100%);
  box-shadow: 0 0 25px rgba(255,183,0,0.3);
}

/* カードヘッダー */
.card-header-title {
  font-size: 16px;
  font-weight: 800;
  color: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid rgba(255,255,255,0.06);
  padding-bottom: 8px;
  margin-bottom: 12px;
}
.card-header-title span { font-size: 11px; color: #5a5a7a; font-weight: normal; }

/* メイン表示（レベルとバッジ） */
.main-display {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.rank-badge {
  font-size: 12px;
  font-weight: 900;
  padding: 4px 10px;
  background: #23233b;
  color: #a0a0c0;
  border-radius: 6px;
}
.rank-R .rank-badge { background: #00d2ff; color: #000; }
.rank-SR .rank-badge { background: #ff007b; color: #fff; }
.rank-SSR .rank-badge { background: #ffb700; color: #000; animation: bounce 0.6s infinite alternate; }

@keyframes bounce {
  0% { transform: translateY(0); }
  100% { transform: translateY(-3px); }
}

/* 縮小：レベル文字を 72px → 52px にダイエット */
.level-zone { line-height: 1; }
.level-num {
  font-size: 52px;
  font-weight: 900;
  font-family: 'Impact', 'Arial Black', sans-serif;
  color: #4a4a6a; /* 未実行時はグレー */
}
.rank-N .level-num { color: #fff; }
.rank-R .level-num { color: #00d2ff; }
.rank-SR .level-num { color: #ff007b; }
.rank-SSR .level-num { color: #ffb700; text-shadow: 0 0 15px rgba(255,183,0,0.4); }

/* 二つ名 */
.nickname {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 12px;
  color: #fff;
}
.rank-SSR .nickname { color: #ffb700; }

/* メーター領域もコンパクトに */
.status-monitor {
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 12px;
}
.status-row { margin-bottom: 8px; }
.status-row:last-child { margin-bottom: 0; }
.status-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #8a8ab5;
  margin-bottom: 4px;
}
.status-bar-bg {
  height: 6px;
  background: #1a1a2e;
  border-radius: 3px;
  overflow: hidden;
}
.status-bar-fill {
  height: 100%;
  width: 0%; /* 初期値はJSおよびHTML側で0%に固定 */
  background: #3a3a5a;
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.1, 1, 0.1, 1);
}
.rank-R .status-bar-fill { background: #00d2ff; }
.rank-SR .status-bar-fill { background: #ff007b; }
.rank-SSR .status-bar-fill { background: linear-gradient(90deg, #ff5500, #ffb700); }

/* 解説テキスト */
.analysis-text {
  font-size: 13px;
  line-height: 1.5;
  color: #a5a5b5;
  background: rgba(255,255,255,0.02);
  padding: 10px 12px;
  border-radius: 8px;
}

/* 🕹️ ボタン配置の大手術：シェアと保存を横並びにして縦幅カット！ */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  box-sizing: border-box;
  transition: all 0.1s ease;
}
button:active { transform: scale(0.98); }

.btn-main {
  background: linear-gradient(135deg, #00d2ff, #0088ff);
  color: #fff;
  box-shadow: 0 4px 12px rgba(0,136,255,0.25);
  margin-bottom: 8px;
}
.rank-SR-active .btn-main { background: linear-gradient(135deg, #ff007b, #9900ff); box-shadow: 0 4px 12px rgba(255,0,123,0.25); }
.rank-SSR-active .btn-main { background: linear-gradient(135deg, #ffb700, #ff5500); box-shadow: 0 4px 12px rgba(255,183,0,0.25); }

/* 横並びボタン用のコンテナ */
.btn-group {
  display: flex;
  gap: 8px;
}
.btn-save {
  background: #23233b;
  color: #fff;
  border: 1px solid #33335c;
  font-size: 13px;
  padding: 12px;
}
.btn-share {
  background: #fff;
  color: #000;
  font-size: 13px;
  padding: 12px;
  box-shadow: 0 4px 10px rgba(255,255,255,0.1);
}

/* 演出レイヤー */
#loading, #ssrOverlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: #0b0b12;
  z-index: 100;
}
#loading.active, #ssrOverlay.active { display: flex; }
#loadingText { font-size: 16px; font-weight: bold; color: #00d2ff; }
#ssrOverlay { font-size: 32px; font-weight: 900; color: #ffb700; text-shadow: 0 0 20px #ffb700; z-index: 200; opacity: 0; transition: opacity 0.2s; }
#ssrOverlay.show { opacity: 1; }

.shake { animation: light-shake 0.3s ease; }
.flash { animation: screen-flash 0.3s ease-out; }
@keyframes light-shake {
  0%, 100% { transform: translate(0,0); }
  20%, 60% { transform: translate(-3px, 1px); }
  40%, 80% { transform: translate(3px, -1px); }
}
@keyframes screen-flash {
  0% { background: #ffffff; opacity: 0.2; }
  100% { background: #0b0b12; opacity: 1; }
}
</style>
</head>

<body class="rank-ready">

<div id="loading">
  <div id="loadingText">サボり遺伝子をスキャン中...</div>
</div>

<div id="ssrOverlay">✨ SSR神確定 ✨</div>

<div class="container">

  <div class="app-main-title">SABORI CHECKER</div>

  <!-- 📸 初期状態を完全に「未実行状態」にリセットしました -->
  <div class="card-wrapper rank-N" id="diagnosticCard">
    
    <div class="card-header-title">
      サボり度診断
      <span id="serialNo">#000000</span>
    </div>
    
    <div class="main-display">
      <div class="rank-badge" id="badge">RANK --</div>
      <div class="level-zone">
        <span class="level-num" id="level">--</span>
      </div>
    </div>

    <div class="nickname" id="nickname">診断未実行</div>
    
    <div class="status-monitor">
      <div class="status-row">
        <div class="status-meta"><span>スマホ依存度</span><span id="valA">0%</span></div>
        <div class="status-bar-bg"><div class="status-bar-fill" id="barA" style="width: 0%;"></div></div>
      </div>
      <div class="status-row">
        <div class="status-meta"><span>現実逃避癖</span><span id="valB">0%</span></div>
        <div class="status-bar-bg"><div class="status-bar-fill" id="barB" style="width: 0%;"></div></div>
      </div>
      <div class="status-row">
        <div class="status-meta"><span>労働拒否指数</span><span id="valC">0%</span></div>
        <div class="status-bar-bg"><div class="status-bar-fill" id="barC" style="width: 0%;"></div></div>
      </div>
    </div>

    <div class="analysis-text" id="text">「診断する」ボタンを押して、あなたの脳内サボり度を定量計測してください。</div>
  </div>

  <!-- 🕹️ 操作ボタン：綺麗に1画面に収まる構造に変更 -->
  <button class="btn-main" id="mainBtn" onclick="run()">診断する</button>
  
  <div class="btn-group">
    <button class="btn-save" onclick="saveAsImage()">画像として保存</button>
    <button class="btn-share" onclick="shareResult()">結果をシェア</button>
  </div>

</div>

<script>
const data = [
  { id: 1, level: 1, rank: "N", name: "起動前人間", text: "まだ何もしてないのに疲れている状態。脳のメインシステムが立ち上がる前に1日の限界を迎える、究極の省エネモード生命体。", bars: [25, 10, 85] },
  { id: 5, level: 5, rank: "N", name: "軽休憩民", text: "「5分だけ休む」の5分が本編。本業と休憩の主客転倒が深刻化しており、作業を再開するためのエネルギーを休憩で消費するタイプ。", bars: [45, 55, 60] },
  { id: 10, level: 10, rank: "R", name: "スマホ吸引体", text: "強力な磁場に引かれるように、無意識下で右手がスマホをホールドする特異体質。スクリーンタイムは驚異の2桁へ突入寸前。", bars: [98, 40, 50] },
  { id: 20, level: 20, rank: "R", name: "動画中毒者", text: "「あと1本」という甘美な嘘を自分に吐き続ける無限ループの囚人。縦型ショート動画のアルゴリズムに完全に脳をハックされている。", bars: [92, 75, 70] },
  { id: 50, level: 50, rank: "SR", name: "現実逃避マスター", text: "重要タスクが目の前に迫ると脳が非常事態を検知。突如として部屋の大掃除や、どうでもいい調べ物を開始する逃避界のプロフェッショナル。", bars: [65, 99, 85] },
  { id: 99, level: 99, rank: "SSR", name: "サボり神", text: "高次元へのアセンションを遂げた結果、脳内から「努力」の概念が完全アンインストールされた存在。生きているだけで時空をサボらせる絶対神。", bars: [99, 99, 99] }
];

const loadingMessages = ["スキャン中...", "解析中...", "ログ抽出中...", "照合中..."];
let state = "idle";
let loadingInterval;
let lastResult = null;

window.addEventListener("DOMContentLoaded", () => {
  const urlParams = new URLSearchParams(window.location.search);
  const sharedId = urlParams.get("id");
  if (sharedId) {
    const sharedData = data.find(item => item.id == sharedId);
    if (sharedData) {
      lastResult = sharedData;
      showResult(sharedData);
    }
  }
});

function run() {
  if (state !== "idle") return;
  state = "loading";
  
  startLoading(() => {
    const result = data[Math.floor(Math.random() * data.length)];
    lastResult = result;

    // URLを書き換える
    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?id=${result.id}`;
    window.history.pushState({ path: newUrl }, '', newUrl);

    playFx(result, () => {
      showResult(result);
      state = "idle";
    });
  });
}

function startLoading(done) {
  const loading = document.getElementById("loading");
  const text = document.getElementById("loadingText");
  loading.classList.add("active");

  let i = 0;
  text.textContent = loadingMessages[0];
  loadingInterval = setInterval(() => {
    i++;
    text.textContent = loadingMessages[i % loadingMessages.length];
  }, 150);

  setTimeout(() => {
    clearInterval(loadingInterval);
    loading.classList.remove("active");
    done();
  }, 1000);
}

function showResult(r) {
  const card = document.getElementById("diagnosticCard");
  const container = document.body;
  card.className = "card-wrapper rank-" + r.rank;
  
  container.className = `rank-${r.rank}-active`;

  const pseudoSerial = "#" + Math.floor(Math.random() * 900000 + 100000);
  document.getElementById("serialNo").textContent = pseudoSerial;

  document.getElementById("badge").textContent = "RANK " + r.rank;
  document.getElementById("level").textContent = "Lv " + r.level;
  document.getElementById("nickname").textContent = r.name;
  document.getElementById("text").textContent = r.text;

  document.getElementById("barA").style.width = r.bars[0] + "%";
  document.getElementById("barB").style.width = r.bars[1] + "%";
  document.getElementById("barC").style.width = r.bars[2] + "%";
  document.getElementById("valA").textContent = r.bars[0] + "%";
  document.getElementById("valB").textContent = r.bars[1] + "%";
  document.getElementById("valC").textContent = r.bars[2] + "%";
}

function playFx(result, callback) {
  document.body.classList.add("shake", "flash");
  setTimeout(() => document.body.classList.remove("shake", "flash"), 400);

  if (result.rank === "SSR") {
    playSSR(callback);
  } else {
    callback();
  }
}

function playSSR(callback) {
  const overlay = document.getElementById("ssrOverlay");
  overlay.classList.add("active");
  setTimeout(() => overlay.classList.add("show"), 10);

  setTimeout(() => {
    overlay.classList.remove("show");
    setTimeout(() => {
      overlay.classList.remove("active");
      callback();
    }, 200);
  }, 1000);
}

function saveAsImage() {
  if (!lastResult) {
    alert("診断を実行してください。");
    return;
  }
  const card = document.getElementById("diagnosticCard");
  html2canvas(card, {
    backgroundColor: "#0b0b12",
    scale: 2,
    logging: false,
    useCORS: true
  }).then(canvas => {
    const imageData = canvas.toDataURL("image/png");
    const link = document.createElement("a");
    link.href = imageData;
    link.download = `SABORI_LV${lastResult.level}.png`;
    link.click();
  }).catch(err => {
    alert("画像生成失敗。スクショを推奨します。");
  });
}

function shareResult() {
  if (!lastResult) {
    alert("データがありません。");
    return;
  }
  const shareUrl = window.location.href;
  const text = `【サボり度診断 MAX】\n結果：${lastResult.name} (Lv ${lastResult.level})\n\n👇ここでサボり度を計測する\n${shareUrl}`;
  navigator.clipboard.writeText(text).then(() => {
    alert("URLコピー完了！SNSに貼り付けてね！");
  });
}
</script>

</body>
</html>
