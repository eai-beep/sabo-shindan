<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり度測定コア MAX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Consolas', 'Courier New', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
  background: #06060a;
  /* 変更点①: 背景に薄く近未来的なサイバーグリッドを配置 */
  background-image: 
    linear-gradient(rgba(18, 16, 26, 0.8) 0%, rgba(6, 6, 10, 1) 100%),
    linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 100% 100%, 20px 20px, 20px 20px;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 10px;
  box-sizing: border-box;
}

.container {
  width: 100%;
  max-width: 420px;
}

/* 変更点②: シンプルさを完全破壊した、情報密度の高いヘヴィ・カードデザイン */
.card-wrapper {
  background: #0e0e16;
  border: 2px solid #1f1f30;
  border-radius: 12px;
  padding: 24px;
  box-sizing: border-box;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
  position: relative;
  overflow: hidden;
  margin-bottom: 20px;
}

/* 枠線のネオン発光（ランク別） */
.card-wrapper.rank-N { border-color: #3e3e4f; box-shadow: 0 0 15px rgba(62,62,79,0.2); }
.card-wrapper.rank-R { border-color: #00e5ff; box-shadow: 0 0 20px rgba(0,229,255,0.25), inset 0 0 15px rgba(0,229,255,0.05); }
.card-wrapper.rank-SR { border-color: #ff0055; box-shadow: 0 0 25px rgba(255,0,85,0.3), inset 0 0 15px rgba(255,0,85,0.05); }
.card-wrapper.rank-SSR { 
  border-color: #ffb700; 
  background: linear-gradient(135deg, #0e0e16 0%, #1c1505 100%);
  box-shadow: 0 0 35px rgba(255,183,0,0.4), inset 0 0 20px rgba(255,183,0,0.1);
}

/* メカニカルなヘッダー領域 */
.card-header {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  letter-spacing: 1px;
  color: #52527a;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding-bottom: 8px;
  margin-bottom: 20px;
  font-weight: bold;
}
.rank-R .card-header { color: #00bcff; }
.rank-SR .card-header { color: #ff0055; }
.rank-SSR .card-header { color: #ffb700; }

/* ビジュアルの主役：大きなランク＆レベル表示 */
.main-display {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
}

.rank-badge {
  font-size: 12px;
  font-weight: 900;
  padding: 4px 10px;
  background: #1f1f30;
  color: #8c8caa;
  border-radius: 4px;
  letter-spacing: 1px;
}
.rank-R .rank-badge { background: #00e5ff; color: #000; }
.rank-SR .rank-badge { background: #ff0055; color: #fff; }
.rank-SSR .rank-badge { background: #ffb700; color: #000; font-size: 14px; animation: pulse 1s infinite alternate; }

@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 5px #ffb700; }
  100% { transform: scale(1.05); box-shadow: 0 0 15px #ffb700; }
}

/* レベルの超巨大化＋傾斜化 */
.level-zone {
  text-align: right;
  line-height: 1;
}
.level-label {
  font-size: 14px;
  font-weight: bold;
  color: #52527a;
  text-transform: uppercase;
  margin-right: 4px;
}
.level-num {
  font-size: 64px;
  font-weight: 900;
  font-family: 'Impact', 'Arial Black', sans-serif;
  letter-spacing: -2px;
  font-style: italic;
  display: inline-block;
  transform: skewX(-10deg);
}
.rank-R .level-num { color: #00e5ff; text-shadow: 0 0 10px rgba(0,229,255,0.4); }
.rank-SR .level-num { color: #ff0055; text-shadow: 0 0 12px rgba(255,0,85,0.4); }
.rank-SSR .level-num { color: #ffb700; text-shadow: 0 0 20px rgba(255,183,0,0.6); }

/* 二つ名 */
.nickname {
  font-size: 24px;
  font-weight: bold;
  letter-spacing: 1px;
  margin-bottom: 20px;
}
.rank-SSR .nickname { color: #ffb700; text-shadow: 0 0 10px rgba(255,183,0,0.3); }

/* 変更点③: 画面の情報量をブチ上げる「3連ステータスメーター」 */
.status-monitor {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.03);
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 20px;
}
.status-row {
  margin-bottom: 10px;
}
.status-row:last-child { margin-bottom: 0; }
.status-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #8c8caa;
  margin-bottom: 4px;
}
.status-bar-bg {
  height: 6px;
  background: #151522;
  border-radius: 3px;
  overflow: hidden;
}
.status-bar-fill {
  height: 100%;
  width: 0%; /* JSで可変 */
  background: #4e4e6a;
  border-radius: 3px;
  transition: width 0.5s ease-out;
}
/* ランクごとのメーター色変化 */
.rank-R .status-bar-fill { background: linear-gradient(90deg, #0088ff, #00e5ff); }
.rank-SR .status-bar-fill { background: linear-gradient(90deg, #ff0055, #ff5500); }
.rank-SSR .status-bar-fill { background: linear-gradient(90deg, #ff5500, #ffb700); }

/* 説明テキスト */
.analysis-text {
  font-size: 13px;
  line-height: 1.6;
  color: #b5b5c5;
  background: rgba(255,255,255,0.01);
  border-left: 3px solid #3e3e4f;
  padding: 10px 12px;
}
.rank-R .analysis-text { border-left-color: #00e5ff; }
.rank-SR .analysis-text { border-left-color: #ff0055; }
.rank-SSR .analysis-text { border-left-color: #ffb700; background: rgba(255,183,0,0.02); }

/* UI操作ボタン（フラット＆ソリッドに変貌） */
button {
  width: 100%;
  padding: 16px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  box-sizing: border-box;
  letter-spacing: 1px;
}
.btn-main {
  background: #fff;
  color: #000;
  box-shadow: 0 4px 15px rgba(255,255,255,0.1);
}
.btn-save {
  background: #1f1f30;
  color: #fff;
  border: 1px solid #3e3e4f;
}
.btn-save:hover { background: #2a2a3f; }
.btn-sub {
  background: transparent;
  color: #52527a;
  font-size: 13px;
  padding: 8px;
}

/* 演出用オーバーレイ */
#loading, #ssrOverlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: #06060a;
  z-index: 100;
}
#loading.active, #ssrOverlay.active { display: flex; }
#loadingText { font-family: monospace; font-size: 16px; color: #ff0055; text-shadow: 0 0 10px rgba(255,0,85,0.5); }
#ssrOverlay { font-size: 36px; font-weight: 900; color: #ffb700; text-shadow: 0 0 20px #ffb700; z-index: 200; opacity: 0; transition: opacity 0.2s; }
#ssrOverlay.show { opacity: 1; }

/* 特殊演出クラス */
.shake { animation: extreme-shake 0.3s linear; }
.flash { animation: screen-flash 0.4s ease-out; }
@keyframes extreme-shake {
  0%, 100% { transform: translate(0,0); }
  10% { transform: translate(-6px, -2px); }
  30% { transform: translate(5px, 4px); }
  50% { transform: translate(-5px, -3px); }
  70% { transform: translate(4px, 2px); }
  90% { transform: translate(-2px, 1px); }
}
@keyframes screen-flash {
  0% { background: #ff0055; opacity: 0.5; }
  100% { background: #06060a; opacity: 1; }
}
</style>
</head>

<body>

<div id="loading">
  <div id="loadingText">> SCANNING BRAIN_LOG...</div>
</div>

<div id="ssrOverlay">⚡ GOD DETECTED ⚡</div>

<div class="container">

  <div class="card-wrapper rank-N" id="diagnosticCard">
    <div class="card-header">
      <span>SYS_LOG: ACTIVE</span>
      <span id="serialNo">#000000</span>
    </div>
    
    <div class="main-display">
      <div class="rank-badge" id="badge">RANK N</div>
      <div class="level-zone">
        <span class="level-label">Lv</span>
        <span class="level-num" id="level">--</span>
      </div>
    </div>

    <div class="nickname" id="nickname">SYSTEM STANDBY</div>
    
    <div class="status-monitor">
      <div class="status-row">
        <div class="status-meta"><span>スマホ吸引率</span><span id="valA">0%</span></div>
        <div class="status-bar-bg"><div class="status-bar-fill" id="barA"></div></div>
      </div>
      <div class="status-row">
        <div class="status-meta"><span>現実逃避癖</span><span id="valB">0%</span></div>
        <div class="status-bar-bg"><div class="status-bar-fill" id="barB"></div></div>
      </div>
      <div class="status-row">
        <div class="status-meta"><span>労働拒否指数</span><span id="valC">0%</span></div>
        <div class="status-bar-bg"><div class="status-bar-fill" id="barC"></div></div>
      </div>
    </div>

    <div class="analysis-text" id="text">下部のトリガーボタンを押して、脳内精神ログのスキャンおよびサボり因子の定量的測定を開始してください。</div>
  </div>

  <button class="btn-main" onclick="run()">診断を実行する</button>
  <button class="btn-save" onclick="saveAsImage()">結果を画像として保存</button>
  <button class="btn-sub" onclick="shareResult()">結果URLをコピーしてシェア</button>
  <button class="btn-sub" style="color: #333;" onclick="resetUIWithURLClear()">システム初期化</button>

</div>

<script>
// 変更点④: 視覚的な説得力を出すための「3連パラメーター」データを結果毎に追加
const data = [
  { id: 1, level: 1, rank: "N", name: "起動前人間", text: "まだ何もしてないのに疲れている状態。脳のメインシステムが立ち上がる前に1日の稼働限界を迎える、究極の省エネ生命体。", bars: [25, 10, 85] },
  { id: 5, level: 5, rank: "N", name: "軽休憩民", text: "「5分だけ休む」の5分が本編。本業と休憩の主客転倒が深刻化しており、作業を再開するためのエネルギーを休憩で消費する矛盾を抱える。", bars: [45, 55, 60] },
  { id: 10, level: 10, rank: "R", name: "スマホ吸引体", text: "強力な磁場に引かれるように、無意識下で右手がスマホをホールドする特異体質。スクリーンタイムは驚異の2桁へ突入寸前。", bars: [98, 40, 50] },
  { id: 20, level: 20, rank: "R", name: "動画中毒者", text: "「あと1本」という甘美な嘘を自分に吐き続ける無限ループの囚人。縦型ショート動画のアルゴリズムに完全に脳をハックされている。", bars: [92, 75, 70] },
  { id: 50, level: 50, rank: "SR", name: "現実逃避マスター", text: "重要タスクが目の前に迫ると、脳内回路が非常事態を検知。突如として部屋の大掃除や、Wikipediaの深掘りを開始する逃避界のプロフェッショナル。", bars: [65, 99, 85] },
  { id: 99, level: 99, rank: "SSR", name: "サボり神", text: "高次元へのアセンションを遂げた結果、脳内から「努力」の概念パッチが完全アンインストールされた存在。生きているだけで時空をサボらせる絶対神。", bars: [99, 99, 99] }
];

const loadingMessages = ["> CONNECTING NEURON...", "> ANALYZING GENE...", "> EXTRACTING LOGS...", "> MATCHING EXCUSES..."];
let state = "idle";
let loadingInterval;
let lastResult = null;

window.addEventListener("DOMContentLoaded", () => {
  const urlParams = new URLSearchParams(window.location.search);
  const sharedId = urlParams.get("id");
  if (sharedId) {
    const sharedData = data.find(item => item.id == sharedId);
    if (sharedData) {
      lastResult = sharedData;
      showResult(sharedData);
    }
  }
});

function run() {
  if (state !== "idle") return;
  state = "loading";
  
  startLoading(() => {
    const result = data[Math.floor(Math.random() * data.length)];
    lastResult = result;

    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?id=${result.id}`;
    window.history.pushState({ path: newUrl }, '', newUrl);

    playFx(result, () => {
      showResult(result);
      state = "idle";
    });
  });
}

function startLoading(done) {
  const loading = document.getElementById("loading");
  const text = document.getElementById("loadingText");
  loading.classList.add("active");

  let i = 0;
  text.textContent = loadingMessages[0];
  loadingInterval = setInterval(() => {
    i++;
    text.textContent = loadingMessages[i % loadingMessages.length];
  }, 150);

  setTimeout(() => {
    clearInterval(loadingInterval);
    loading.classList.remove("active");
    done();
  }, 1200);
}

function showResult(r) {
  const card = document.getElementById("diagnosticCard");
  card.className = "card-wrapper rank-" + r.rank;
  
  // 固有シリアルナンバーの偽装生成（バズ用の唯一無二感演出）
  const pseudoSerial = "#" + Math.floor(Math.random() * 900000 + 100000);
  document.getElementById("serialNo").textContent = pseudoSerial;

  document.getElementById("badge").textContent = "RANK " + r.rank;
  document.getElementById("level").textContent = r.level;
  document.getElementById("nickname").textContent = r.name;
  document.getElementById("text").textContent = r.text;

  // メーターと数値テキストを動的に同期
  document.getElementById("barA").style.width = r.bars[0] + "%";
  document.getElementById("barB").style.width = r.bars[1] + "%";
  document.getElementById("barC").style.width = r.bars[2] + "%";
  document.getElementById("valA").textContent = r.bars[0] + "%";
  document.getElementById("valB").textContent = r.bars[1] + "%";
  document.getElementById("valC").textContent = r.bars[2] + "%";
}

function resetUI() {
  const card = document.getElementById("diagnosticCard");
  card.className = "card-wrapper rank-N";
  document.getElementById("serialNo").textContent = "#000000";
  document.getElementById("badge").textContent = "RANK N";
  document.getElementById("level").textContent = "--";
  document.getElementById("nickname").textContent = "SYSTEM STANDBY";
  document.getElementById("text").textContent = "下部のトリガーボタンを押して、脳内精神ログのスキャンおよびサボり因子の定量的測定を開始してください。";
  
  document.getElementById("barA").style.width = "0%";
  document.getElementById("barB").style.width = "0%";
  document.getElementById("barC").style.width = "0%";
  document.getElementById("valA").textContent = "0%";
  document.getElementById("valB").textContent = "0%";
  document.getElementById("valC").textContent = "0%";
}

function resetUIWithURLClear() {
  resetUI();
  lastResult = null;
  const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
  window.history.pushState({ path: cleanUrl }, '', cleanUrl);
}

function playFx(result, callback) {
  document.body.classList.add("shake", "flash");
  setTimeout(() => document.body.classList.remove("shake", "flash"), 500);

  if (result.rank === "SSR") {
    playSSR(callback);
  } else {
    callback();
  }
}

function playSSR(callback) {
  const overlay = document.getElementById("ssrOverlay");
  overlay.classList.add("active");
  setTimeout(() => overlay.classList.add("show"), 10);

  setTimeout(() => {
    overlay.classList.remove("show");
    setTimeout(() => {
      overlay.classList.remove("active");
      callback();
    }, 200);
  }, 1200);
}

function saveAsImage() {
  if (!lastResult) {
    alert("対象データ未検出。診断を実行してください。");
    return;
  }
  const card = document.getElementById("diagnosticCard");
  html2canvas(card, {
    backgroundColor: "#06060a",
    scale: 2,
    logging: false,
    useCORS: true
  }).then(canvas => {
    const imageData = canvas.toDataURL("image/png");
    const link = document.createElement("a");
    link.href = imageData;
    link.download = `SABORI_REPORT_LV${lastResult.level}.png`;
    link.click();
  }).catch(err => {
    alert("画像化エラー。スクリーンショットでの保存を推奨します。");
  });
}

function shareResult() {
  if (!lastResult) {
    alert("対象データ未検出。");
    return;
  }
  const shareUrl = window.location.href;
  const text = `【サボり度測定コア MAX】\n計測結果：${lastResult.name} (Lv ${lastResult.level})\n\n👇脳内精神ログのスキャンを実行する\n${shareUrl}`;
  navigator.clipboard.writeText(text).then(() => {
    alert("共有用テキストをクリップボードに格納しました。");
  });
}
</script>

</body>
</html>
