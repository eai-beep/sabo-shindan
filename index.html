<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>サボり診断</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  text-align: center;
  padding: 30px;
}

h1 { font-size: 20px; }

button {
  padding: 12px 18px;
  font-size: 16px;
  margin: 8px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}

.box {
  margin-top: 20px;
  padding: 10px;
  border: 1px solid #333;
}

.small {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<h1>サボり診断メーカー</h1>

<button onclick="run()">診断する</button>

<div id="result"></div>

<div>
  <button id="shareBtn" onclick="share()" style="display:none;">シェア</button>
  <button id="retryBtn" onclick="retry()" style="display:none;">もう一回</button>
</div>

<div class="small">スクショ推奨</div>

<hr>

<h2>ログダッシュボード</h2>
<button onclick="showStats()">ログを見る</button>
<div id="stats" class="box"></div>

<hr>

<h2>当たりワードランキング</h2>
<button onclick="showTop()">ランキング表示</button>
<div id="ranking" class="box"></div>

<script>
// ■ ワードデータ
const data = [
{level:87,name:"偏差値溶かし職人",text:"スマホ6時間、勉強0時間。完全にSNS専用脳。"},
{level:42,name:"無限スクロール亡者",text:"気づいたら3時間スクロールしてる。"},
{level:99,name:"現実逃避マスター",text:"テスト前なのに掃除が進む現象。"},
{level:73,name:"夜更かし依存体",text:"午前2時の明日やる宣言。"},
{level:90,name:"提出直前型人間",text:"締切30分前だけ本気出すタイプ。"},
{level:78,name:"集中崩壊体",text:"5分集中→30分スマホループ。"},
{level:85,name:"課題回避プロ",text:"勉強以外なら全部やる才能。"}
];

// ■ ログ
let log = {
  count: 0,
  retry: 0,
  share: 0,
  results: [],
  lastResult: null
};

// ■ 診断
function run() {
  const r = data[Math.floor(Math.random() * data.length)];

  document.getElementById("result").innerHTML =
    "Lv." + r.level + " " + r.name + "<br><br>" + r.text;

  document.getElementById("shareBtn").style.display = "inline-block";
  document.getElementById("retryBtn").style.display = "inline-block";

  log.count++;
  log.lastResult = r;

  log.results.push({
    name: r.name,
    level: r.level,
    shared: 0,
    retry: 0
  });

  save();
}

// ■ 再生成
function retry() {
  log.retry++;

  const idx = log.results.length - 1;
  if (log.results[idx]) log.results[idx].retry++;

  save();
  run();
}

// ■ シェア
function share() {
  log.share++;

  const idx = log.results.length - 1;
  if (log.results[idx]) log.results[idx].shared++;

  const text =
    "サボり診断結果：Lv." +
    log.lastResult.level + " " +
    log.lastResult.name;

  navigator.clipboard.writeText(text);
  alert("コピーした！");

  save();
}

// ■ 保存
function save() {
  localStorage.setItem("sabo_log", JSON.stringify(log));
}

// ■ 読み込み
(function init(){
  const saved = localStorage.getItem("sabo_log");
  if (saved) log = JSON.parse(saved);
})();

// ■ ダッシュボード
function showStats() {
  document.getElementById("stats").innerText =
`診断回数：${log.count}
再生成回数：${log.retry}
シェア回数：${log.share}`;
}

// ■ ランキング
function showTop() {
  if (!log.results) return;

  const scored = log.results.map(r => ({
    ...r,
    score: (r.shared * 5) + (r.retry * 2)
  }));

  scored.sort((a, b) => b.score - a.score);

  const top = scored.slice(0, 5);

  let html = "";

  top.forEach((r, i) => {
    html += `<div>${i+1}. ${r.name}（score:${r.score}）</div>`;
  });

  document.getElementById("ranking").innerHTML = html;
}
</script>

</body>
</html>
