<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabori Combo Selector Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #06060c;
  --card-bg: #0d0d1a;
  --border-color: #1e1e38;
  --accent-blue: #00bfff;
  --accent-magenta: #ff1493;
  --accent-amber: #ffaa00;
  --text-main: #ffffff;
  --text-muted: #555577;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg-color);
  color: var(--text-main);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 16px;
  box-sizing: border-box;
}

.app-container {
  width: 100%;
  max-width: 380px;
  position: relative;
}

.app-header {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--accent-blue);
  margin-bottom: 16px;
  text-transform: uppercase;
}

/* 🎴 メインコンテンツカード */
.display-card {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 24px;
  box-sizing: border-box;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

/* レア度別クラス */
.display-card.tier-normal { border-color: #202040; }
.display-card.tier-rare   { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0, 191, 255, 0.15); }
.display-card.tier-epic   { border-color: var(--accent-magenta); box-shadow: 0 0 15px rgba(255, 20, 147, 0.15); }
.display-card.tier-legend { 
  border-color: var(--accent-amber); 
  background: linear-gradient(145deg, #0d0d1a 0%, #1a1202 100%);
  box-shadow: 0 0 25px rgba(255, 170, 0, 0.25); 
}

/* ⚡️ LEGEND当選時の品のあるライトフラッシュ */
@keyframes softFlash {
  0% { background: #fff; opacity: 0.5; }
  100% { background: transparent; opacity: 0; }
}
.flash-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}
.flash-layer.trigger {
  animation: softFlash 0.4s ease-out forwards;
}

.card-info {
  display: flex;
  justify-content: space-between;
  color: var(--text-muted);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 16px;
}

.title-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.status-badge {
  font-size: 9px;
  font-weight: 800;
  padding: 4px 8px;
  background: #161630;
  color: #666688;
  border-radius: 4px;
  letter-spacing: 1px;
}
.tier-rare .status-badge   { background: var(--accent-blue); color: #000; }
.tier-epic .status-badge   { background: var(--accent-magenta); color: #fff; }
.tier-legend .status-badge { background: var(--accent-amber); color: #000; }

.level-value {
  font-size: 34px;
  font-weight: 800;
  font-family: monospace, sans-serif;
  line-height: 1;
  color: #2a2a44;
}
.tier-rare .level-value   { color: var(--accent-blue); text-shadow: 0 0 8px rgba(0,191,255,0.2); }
.tier-epic .level-value   { color: var(--accent-magenta); text-shadow: 0 0 8px rgba(255,20,147,0.2); }
.tier-legend .level-value { color: var(--accent-amber); text-shadow: 0 0 12px rgba(255,170,0,0.3); }

.content-name {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 16px;
  min-height: 24px;
  line-height: 1.4;
}

/* 🎰 スロット演出用エリア */
.content-text {
  background: rgba(0, 0, 0, 0.3);
  border-radius: 8px;
  padding: 16px;
  font-size: 13px;
  line-height: 1.6;
  font-weight: 500;
  min-height: 64px;
  display: flex;
  align-items: center;
  border: 1px solid rgba(255, 255, 255, 0.02);
  color: #ccccdd;
}

.shuffle-active {
  animation: visualBlur 0.05s infinite alternate;
  color: #555577 !important;
}
@keyframes visualBlur {
  0% { transform: scale(0.99); opacity: 0.7; }
  100% { transform: scale(1.01); opacity: 0.8; }
}

/* 📈 インタラクションボタン */
.interaction-cluster {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 18px;
}

.action-trigger {
  background: #111124;
  border: 1px solid #222244;
  color: #7777aa;
  padding: 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}
.action-trigger:hover { background: #181835; color: #fff; }

.btn-rate { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(0, 191, 255, 0.01); }
.btn-link { border-color: var(--accent-magenta); color: var(--accent-magenta); background: rgba(255, 20, 147, 0.01); }
.btn-share { border-color: var(--accent-amber); color: var(--accent-amber); background: rgba(255, 170, 0, 0.01); }

/* 🎲 メインボタン */
.main-trigger {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent-blue), #5f4bdf);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0, 191, 255, 0.15);
}
.main-trigger:disabled {
  background: #1a1a26;
  box-shadow: none;
  color: #444455;
  cursor: not-allowed;
}

.system-status {
  text-align: center;
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 12px;
  letter-spacing: 0.5px;
}

/* 📈 数値ポップアップ */
@keyframes scoreFloat {
  0% { transform: translateY(0) scale(0.8); opacity: 0; }
  20% { opacity: 1; transform: translateY(-10px) scale(1.1); }
  100% { transform: translateY(-28px) scale(1); opacity: 0; }
}
.value-popup {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  font-weight: 700;
  font-size: 14px;
  pointer-events: none;
  animation: scoreFloat 0.5s ease-out forwards;
  z-index: 50;
}

/* ⚙️ 最適化用シークレットボタン（最下部に超薄く配置） */
.admin-panel {
  text-align: center;
  margin-top: 30px;
  opacity: 0.1;
  transition: opacity 0.3s;
}
.admin-panel:hover { opacity: 0.8; }
.admin-btn {
  background: none;
  border: 1px solid #ff1493;
  color: #ff1493;
  font-size: 9px;
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="app-container">
  <div class="app-header">Sabori Combo Selector</div>

  <div class="display-card tier-normal" id="contentCard">
    <div class="flash-layer" id="flashOverlay"></div>
    <div class="card-info">
      <span id="poolCounter">POOL: -- / --</span>
      <span id="itemId">ID: ---</span>
    </div>
    
    <div class="title-row">
      <div class="status-badge" id="itemTier">READY</div>
      <div class="level-value" id="itemLevel">Lv--</div>
    </div>

    <div class="content-name" id="itemName">同期中...</div>
    <div class="content-text" id="contentText">データベースからアクティブなサボりコンボを読み込んでいます。</div>

    <div class="interaction-cluster">
      <button class="action-trigger btn-rate" onclick="processRating(1, this, 'accent-blue')">それな！ (+1)</button>
      <button class="action-trigger btn-link" onclick="handleLinkClick(this)">詳細URLを開く (+3)</button>
      <button class="action-trigger btn-share" onclick="handleShare(this)">結果をシェア (+5)</button>
    </div>
  </div>

  <button class="main-trigger" id="actionBtn" onclick="executeShuffle()" disabled>接続中...</button>
  <div class="system-status" id="sysStatus">Initializing Connection...</div>

  <div class="admin-panel">
    <button class="admin-btn" onclick="maintainEcosystem()">プールを最適化（下位30枠の新陳代謝を執行）</button>
  </div>
</div>

<script>
// 🔑 【重要】あなたのSupabaseの接続情報に書き換えてください
const SUPABASE_URL = "https://rzwqlrdkasqxbowhqcje.supabase.co";
const sb_publishable_2rqGw-JmK0XV72ftyCjvwg_CxMNPmeb";
const supabase = { integrity: false };
  
let activePool = [];
let currentItem = null;

// 接続の初期化
const sbClient = supabasejs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 🔁 起動時：Supabaseから「現在アクティブ（is_active = true）」の100個を瞬時に取得
async function fetchActivePool() {
  try {
    const { data, error } = await sbClient
      .from('sabori_items')
      .select('*')
      .eq('is_active', true);

    if (error) throw error;

    activePool = data;
    document.getElementById("poolCounter").textContent = `ACTIVE POOL: ${activePool.length}`;
    document.getElementById("itemName").textContent = "システムスタンバイ";
    document.getElementById("contentText").textContent = "抽出ボタンを押すと、レア度に応じた傾斜確率でコンボが選出されます。";
    document.getElementById("actionBtn").textContent = "コンテンツを抽出";
    document.getElementById("actionBtn").disabled = false;
    document.getElementById("sysStatus").textContent = "クラウドデータベース同期完了";
  } catch (err) {
    console.error(err);
    document.getElementById("sysStatus").textContent = "接続エラー。設定を確認してください。";
  }
}

// 🎰 レア度に応じた「重み付き抽選」スロット演出
function executeShuffle() {
  if (activePool.length === 0) return;

  const btn = document.getElementById("actionBtn");
  const targetText = document.getElementById("contentText");
  const targetName = document.getElementById("itemName");
  
  btn.disabled = true;
  targetText.classList.add("shuffle-active");

  let ticks = 0;
  let timer = setInterval(() => {
    let preview = activePool[Math.floor(Math.random() * activePool.length)];
    targetName.textContent = preview.name;
    targetText.textContent = preview.text;
    ticks++;
    
    if (ticks > 12) {
      clearInterval(timer);
      targetText.classList.remove("shuffle-active");
      
      // 🎲 確率の傾斜システム（Normal:60%, Rare:25%, Epic:12%, Legend:3%）
      currentItem = calculateWeightedSelection();
      renderSelection(currentItem);
      
      // 表示回数(Imp)をクラウド上へバックグラウンドで+1加算
      reportImpression(currentItem.id, currentItem.imp);
      btn.disabled = false;
    }
  }, 60);
}

// 🎰 重み付き抽選アルゴリズムのコア
function calculateWeightedSelection() {
  const weights = { 'Normal': 60, 'Rare': 25, 'Epic': 12, 'Legend': 3 };
  
  // 現在プール内にある全データの総ウェイトを計算
  let totalWeight = 0;
  const poolWithWeights = activePool.map(item => {
    const w = weights[item.tier] || 10;
    totalWeight += w;
    return { item, accumulated: totalWeight };
  });

  const rarifiedTarget = Math.random() * totalWeight;
  for (const obj of poolWithWeights) {
    if (rarifiedTarget <= obj.accumulated) {
      return obj.item;
    }
  }
  return activePool[0];
}

// ⚙️ 画面への確定反映 ＆ 「100レベル＋補正値」の自動計算
function renderSelection(item) {
  const card = document.getElementById("contentCard");
  const flash = document.getElementById("flashOverlay");
  
  // 補正値マトリクス
  const tierModifiers = { 'Normal': 0, 'Rare': 100, 'Epic': 200, 'Legend': 300 };
  const modifier = tierModifiers[item.tier] || 0;
  const finalLevel = item.base_level + modifier; // 🧠 Claudeの脳内基準を狂わせない自動足し算

  card.className = `display-card tier-${item.tier.toLowerCase()}`;
  document.getElementById("itemId").textContent = `ID: ${String(item.id).padStart(3, '0')}`;
  document.getElementById("itemTier").textContent = item.tier.toUpperCase();
  document.getElementById("itemLevel").textContent = `Lv ${finalLevel}`;
  document.getElementById("itemName").textContent = item.name;
  document.getElementById("contentText").textContent = item.text;

  // Legend（3%）を引いた時だけ気品あるライトフラッシュをトリガー
  flash.classList.remove("trigger");
  if (item.tier === "Legend") {
    void flash.offsetWidth;
    flash.classList.add("trigger");
  }
}

// 📈 クラウドへのインプレッション（表示回数）送信
async function reportImpression(id, currentImp) {
  await sbClient.from('sabori_items').update({ imp: currentImp + 1 }).eq('id', id);
  // ローカルデータも同期
  const local = activePool.find(p => p.id === id);
  if (local) local.imp++;
}

// 📈 各アクションと連動したリアルタイムスコアリング
async function processRating(points, element, colorVariable) {
  if (!currentItem) return;
  
  // クラウドのスコアをリアルタイム更新
  const updatedScore = currentItem.score + points;
  await sbClient.from('sabori_items').update({ score: updatedScore }).eq('id', currentItem.id);
  
  // ローカルデータも同期
  currentItem.score = updatedScore;

  // 視覚ポップアップ演出
  const popup = document.createElement("div");
  popup.className = "value-popup";
  popup.style.color = `var(--${colorVariable})`;
  popup.textContent = `+${points}`;
  element.appendChild(popup);
  setTimeout(() => popup.remove(), 500);
}

function handleLinkClick(btn) {
  if (!currentItem) return;
  processRating(3, btn, 'accent-magenta');
  setTimeout(() => { window.open("https://www.tiktok.com", "_blank"); }, 250);
}

function handleShare(btn) {
  if (!currentItem) return;
  processRating(5, btn, 'accent-amber');
  
  const tierModifiers = { 'Normal': 0, 'Rare': 100, 'Epic': 200, 'Legend': 300 };
  const finalLv = currentItem.base_level + (tierModifiers[currentItem.tier] || 0);
  
  let shareText = encodeURIComponent(`【Sabori Combo Selector】\n[${currentItem.name}] (Lv.${finalLv})\n「${currentItem.text}」\n#サボりコンボ\n`);
  setTimeout(() => { window.open(`https://twitter.com/intent/tweet?text=${shareText}`, "_blank"); }, 250);
}

// 🌊 【自動進化・新陳代謝アルゴリズム】
// 複数人の同時アクセスでデータが壊れるのを防ぐため、あなたが最下部のボタンをポチッと押した瞬間にクラウド側で30枠が美しく入れ替わります。
async function maintainEcosystem() {
  if (!confirm("プール内の下位30枠の新陳代謝（入れ替え）を実行しますか？")) return;
  document.getElementById("sysStatus").textContent = "最適化アルゴリズム実行中...";

  // 1. 全データを取得
  const { data: allItems, error } = await sbClient.from('sabori_items').select('*');
  if (error) return alert("エラーが発生しました");

  let actives = allItems.filter(i => i.is_active);
  let reserves = allItems.filter(i => !i.is_active);

  // 2. コスパ（スコア / 表示回数）を計算してソート。
  // ただし、表示回数が2回以下の「新ネタ」は評価が定まっていないため強制残留（保護）
  actives.sort((a, b) => {
    let scoreA = a.imp >= 3 ? (a.score / a.imp) : 9999; // 保護対象は超高評価扱い
    let scoreB = b.imp >= 3 ? (b.score / b.imp) : 9999;
    return scoreA - scoreB;
  });

  // 下位30個を特定してパージ（非アクティブ化 ＆ 数値リセット）
  let outgoers = actives.slice(0, 30);
  for (let item of outgoers) {
    await sbClient.from('sabori_items').update({ is_active: false, score: 0, imp: 0 }).eq('id', item.id);
  }

  // 3. 待機プールから新鮮な30個をランダムに選出してアクティブ化
  reserves.sort(() => 0.5 - Math.random());
  let incomers = reserves.slice(0, 30);
  for (let item of incomers) {
    await sbClient.from('sabori_items').update({ is_active: true, score: 0, imp: 0 }).eq('id', item.id);
  }

  alert("新陳代謝が完了しました！ページをリロードします。");
  location.reload();
}

// 起動
fetchActivePool();
</script>
</body>
</html>
