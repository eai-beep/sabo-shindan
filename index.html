<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サボり診断 MAX</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: white;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 24px;
  text-align: center;
}

.title { font-size: 20px; margin-bottom: 20px; }

.level { font-size: 28px; margin: 10px 0; }
.nickname { font-size: 22px; margin: 10px 0; }
.text { margin: 10px 0; opacity: 0.8; }

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: gold;
  font-weight: bold;
  color: black;
}

.secondary {
  background: #333;
  color: white;
}
</style>

</head>

<body>

<div class="container">

  <div class="title">サボり診断 MAX</div>

  <div class="level" id="level">Lv --</div>
  <div class="nickname" id="nickname">---</div>
  <div class="text" id="text">ボタンを押してね</div>

  <button class="primary" onclick="run()">診断する</button>
  <button class="secondary" onclick="shareImage()">画像でシェア</button>

</div>

<canvas id="canvas" width="1080" height="1080" style="display:none;"></canvas>

<script>
const data = [
  { level: 1, rank: "N", name: "起動前人間", text: "まだ何もしてないのに疲れてる" },
  { level: 5, rank: "N", name: "軽休憩民", text: "休憩がメインになってる" },
  { level: 10, rank: "R", name: "スマホ吸引体", text: "気づいたらスマホを開いている" },
  { level: 20, rank: "R", name: "動画中毒者", text: "1本のつもりが止まらない" },
  { level: 50, rank: "SR", name: "現実逃避マスター", text: "気づいたら別のことしてる" },
  { level: 99, rank: "SSR", name: "サボり神", text: "努力という概念が未実装" }
];

let lastResult = null;

/* =====================
   診断
===================== */
function run() {
  const result = data[Math.floor(Math.random() * data.length)];
  lastResult = result;

  document.getElementById("level").textContent = "Lv " + result.level;
  document.getElementById("nickname").textContent = result.name;
  document.getElementById("text").textContent = result.text;
}

/* =====================
   画像生成シェア
===================== */
function shareImage() {
  if (!lastResult) {
    alert("まだ診断してない");
    return;
  }

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  // 背景
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, 1080, 1080);

  // タイトル
  ctx.fillStyle = "#fff";
  ctx.font = "60px sans-serif";
  ctx.fillText("サボり診断 MAX", 80, 120);

  // レベル
  ctx.font = "90px sans-serif";
  ctx.fillText("Lv " + lastResult.level, 80, 300);

  // 名前
  ctx.font = "80px sans-serif";
  ctx.fillText(lastResult.name, 80, 450);

  // テキスト
  ctx.font = "40px sans-serif";
  wrapText(ctx, lastResult.text, 80, 600, 900, 50);

  // レア表示
  ctx.font = "50px sans-serif";
  ctx.fillStyle = "gold";
  ctx.fillText(lastResult.rank, 80, 900);

  // ダウンロード
  const url = canvas.toDataURL("image/png");

  const a = document.createElement("a");
  a.href = url;
  a.download = "sabori.png";
  a.click();
}

/* =====================
   折り返しテキスト
===================== */
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split("");
  let line = "";

  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n];
    const metrics = ctx.measureText(testLine);
    const testWidth = metrics.width;

    if (testWidth > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n];
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}
</script>

</body>
</html>
